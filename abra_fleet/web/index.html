  <!-- 🔥 FIREBASE CLOUD MESSAGING FOR WEB PUSH NOTIFICATIONS -->

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
  <script>
    // Firebase configuration from firebase_options.dart
    const firebaseConfig = {
      apiKey: "AIzaSyBQ5F_6J_8VDMbf7b4U_wIk_Z0HdYDRaDo",
      authDomain: "abrafleet-cec94.firebaseapp.com",
      projectId: "abrafleet-cec94",
      storageBucket: "abrafleet-cec94.firebasestorage.app",
      messagingSenderId: "847585068690",
      appId: "1:847585068690:web:763200ebca6fe684d4884b",
      measurementId: "G-GLPPBHGCGT"
    };
    
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    console.log('✅ Firebase Web initialized');
    
    // Get messaging instance
    const messaging = firebase.messaging();
    
    // ✅ VAPID KEY ADDED
    // Generated from Firebase Console: https://console.firebase.google.com/project/abrafleet-cec94/settings/cloudmessaging
    const VAPID_KEY = 'BArcN10q7yMJg9oB7rXcjOX_4dPmzru-XHfSqL_kKJHQdeDdiZizM0ycGo4CPfxc3CRzZDMBuRv0cDDwtorZTi4';
    
    // ============================================================
    // 🔧 HELPER FUNCTIONS FOR AUTO-REGISTRATION
    // ============================================================
    
    // Get JWT token from storage
// Get JWT token from storage - Updated to check Flutter's storage pattern
// Get JWT token from storage - Updated to check Flutter's storage pattern
function getJWTToken() {
  try {
    // Method 1: Check standard localStorage keys
    const standardKeys = [
      'jwt_token',
      'auth_token',
      'token',
      'user_token',
      'flutter.jwt_token',
      'flutter.auth_token'
    ];
    
    for (const key of standardKeys) {
      let token = localStorage.getItem(key);
      if (token && token.length > 50) {
        // Clean the token - remove quotes if present
        token = token.replace(/^["']|["']$/g, '').trim();
        console.log(`✅ Found JWT token in localStorage['${key}']`);
        return token;
      }
    }
    
    // Method 2: Check ALL localStorage keys for JWT pattern
    // Flutter might store it with a generated key
    for (const key of Object.keys(localStorage)) {
      let value = localStorage.getItem(key);
      if (value && value.length > 100) {
        // Clean the value first
        value = value.replace(/^["']|["']$/g, '').trim();
        
        if (value.startsWith('eyJ')) {
          // This looks like a JWT token (starts with 'eyJ')
          console.log(`✅ Found JWT token in localStorage['${key}']`);
          return value;
        }
      }
    }
    
    // Method 3: Check sessionStorage
    for (const key of Object.keys(sessionStorage)) {
      let value = sessionStorage.getItem(key);
      if (value && value.length > 100) {
        // Clean the value first
        value = value.replace(/^["']|["']$/g, '').trim();
        
        if (value.startsWith('eyJ')) {
          console.log(`✅ Found JWT token in sessionStorage['${key}']`);
          return value;
        }
      }
    }
    
    // Debug output
    console.log('🔍 Searching for JWT token...');
    console.log('📦 localStorage keys:', Object.keys(localStorage));
    console.log('❌ JWT token not found');
    
    return null;
  } catch (e) {
    console.error('❌ Error getting JWT token:', e);
    return null;
  }
}
    
    // Check if device is already registered
    function isDeviceRegistered() {
      try {
        const registered = localStorage.getItem('fcm_device_registered');
        const registeredToken = localStorage.getItem('fcm_registered_token');
        return registered === 'true' && registeredToken;
      } catch (e) {
        return false;
      }
    }
    
    // Mark device as registered
    function markDeviceAsRegistered(token) {
      try {
        localStorage.setItem('fcm_device_registered', 'true');
        localStorage.setItem('fcm_registered_token', token);
        localStorage.setItem('fcm_registered_at', new Date().toISOString());
        console.log('✅ Device marked as registered');
      } catch (e) {
        console.error('❌ Error marking device as registered:', e);
      }
    }
    
    // Register device with backend
    function registerDeviceWithBackend(fcmToken, jwtToken) {
      console.log('📤 Registering device with backend...');
      
      return fetch('http://localhost:3001/api/notifications/register-device', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + jwtToken
        },
        body: JSON.stringify({
          deviceToken: fcmToken,
          deviceType: 'web',
          deviceInfo: {
            browser: navigator.userAgent.split(' ').slice(-2).join(' '),
            platform: navigator.platform,
            userAgent: navigator.userAgent,
            registeredAt: new Date().toISOString()
          }
        })
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          console.log('✅ Device registered with backend:', data);
          markDeviceAsRegistered(fcmToken);
          return true;
        } else {
          console.error('❌ Device registration failed:', data);
          return false;
        }
      })
      .catch(err => {
        console.error('❌ Device registration error:', err);
        return false;
      });
    }
    
    // ============================================================
    // 🔔 GET FCM TOKEN WITH RETRY
    // ============================================================
    
    async function getFCMTokenWithRetry(maxRetries = 3, delay = 2000) {
      for (let attempt = 1; attempt <= maxRetries; attempt++) {
        try {
          console.log(`🔄 Attempt ${attempt}/${maxRetries} to get FCM token...`);
          
          const token = await messaging.getToken({ vapidKey: VAPID_KEY });
          
          if (token) {
            console.log('🔥 FCM Token:', token);
            return token;
          }
        } catch (error) {
          console.warn(`⚠️ Attempt ${attempt} failed:`, error.message);
          
          if (attempt < maxRetries) {
            console.log(`⏳ Waiting ${delay/1000}s before retry...`);
            await new Promise(resolve => setTimeout(resolve, delay));
          } else {
            console.error('❌ Failed to get FCM token after', maxRetries, 'attempts');
            throw error;
          }
        }
      }
    }
    
    // ============================================================
    // 🔔 REQUEST NOTIFICATION PERMISSION AND GET TOKEN
    // ============================================================
    
    // Request notification permission and get token
    async function initWebPush() {
      try {
        console.log('🚀 Initializing web push...');
        
        // Request permission
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
          console.log('✅ Notification permission granted');
          
          // Wait a bit for service worker to be fully active
          await new Promise(resolve => setTimeout(resolve, 1000));
          
          try {
            // Get FCM token with retry
            const token = await getFCMTokenWithRetry();
            
            if (token) {
              // Check if we should register
              const jwtToken = getJWTToken();
              const alreadyRegistered = isDeviceRegistered();
              const registeredToken = localStorage.getItem('fcm_registered_token');
              
              // Register if:
              // 1. We have a JWT token (user is logged in)
              // 2. Device is not registered yet OR token has changed
              if (jwtToken && (!alreadyRegistered || registeredToken !== token)) {
                console.log('📤 Auto-registering device...');
                await registerDeviceWithBackend(token, jwtToken);
              } else if (!jwtToken) {
                console.log('⏳ No JWT token yet - will register after login');
              } else {
                console.log('✅ Device already registered with this token');
              }
            }
          } catch (tokenError) {
            console.error('❌ Failed to get FCM token:', tokenError);
            console.log('⚠️ Will retry when JWT token is available');
          }
        } else {
          console.log('❌ Notification permission denied');
        }
      } catch (error) {
        console.error('❌ FCM Web init error:', error);
      }
    }
    
    // ============================================================
    // 📩 HANDLE FOREGROUND MESSAGES
    // ============================================================
    
    // Handle foreground messages
    messaging.onMessage((payload) => {
      console.log('📩 Foreground message:', payload);
      
      // Show notification
      if (Notification.permission === 'granted') {
        new Notification(payload.notification.title, {
          body: payload.notification.body,
          icon: '/favicon.png',
          badge: '/favicon.png',
          data: payload.data,
          tag: payload.data?.notificationId || 'default',
          requireInteraction: true
        });
      }
    });
    
    // ============================================================
    // 🔄 TOKEN MONITOR - Auto-register when JWT appears
    // ============================================================
    
    // Monitor for JWT token changes (for already logged-in users)
    let lastCheckedToken = null;
    let tokenMonitorActive = false;
    
    async function checkAndRegisterDevice() {
      if (tokenMonitorActive) return; // Prevent concurrent runs
      
      try {
        tokenMonitorActive = true;
        const jwtToken = getJWTToken();
        const registered = isDeviceRegistered();
        
        // If we have a token now but didn't before, and we're not registered
        if (jwtToken && jwtToken !== lastCheckedToken && !registered) {
          console.log('🔄 JWT token detected - triggering auto-registration...');
          
          try {
            // Get FCM token with retry
            const fcmToken = await getFCMTokenWithRetry();
            
            if (fcmToken) {
              await registerDeviceWithBackend(fcmToken, jwtToken);
            }
          } catch (error) {
            console.error('❌ Failed to get FCM token for auto-registration:', error);
          }
        }
        
        lastCheckedToken = jwtToken;
      } finally {
        tokenMonitorActive = false;
      }
    }
    
    setInterval(checkAndRegisterDevice, 5000); // Check every 5 seconds
    
    console.log('✅ FCM token monitor active - will auto-register on login');
    
    // ============================================================
    // 🔧 MANUAL REGISTRATION FUNCTION
    // ============================================================
    
    // Global function for manual device registration
    // Can be called from Flutter or JavaScript console
    window.registerFCMDevice = async function() {
      console.log('🔄 Manual FCM device registration triggered...');
      
      const jwtToken = getJWTToken();
      if (!jwtToken) {
        console.error('❌ No JWT token available - user not logged in');
        return Promise.reject('No JWT token');
      }
      
      try {
        const token = await getFCMTokenWithRetry();
        if (token) {
          return await registerDeviceWithBackend(token, jwtToken);
        }
      } catch (err) {
        console.error('❌ Manual registration failed:', err);
        throw err;
      }
    };
    
    console.log('✅ window.registerFCMDevice() available for manual registration');
    
    // ============================================================
    // 📱 REGISTER SERVICE WORKER
    // ============================================================
    
    // Register Firebase Messaging Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/firebase-messaging-sw.js')
        .then((registration) => {
          console.log('✅ Firebase Messaging Service Worker registered:', registration);
          
          // Wait for service worker to become active
          return new Promise((resolve) => {
            if (registration.active) {
              console.log('✅ Service Worker already active');
              resolve(registration);
            } else {
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'activated') {
                    console.log('✅ Service Worker activated');
                    resolve(registration);
                  }
                });
              });
            }
            
            // Fallback timeout
            setTimeout(() => resolve(registration), 2000);
          });
        })
        .then((registration) => {
          console.log('✅ Service Worker is ready, initializing web push...');
          // Initialize web push after service worker is ready
          setTimeout(initWebPush, 1000); // Extra delay to be safe
        })
        .catch((error) => {
          console.error('❌ Service Worker registration failed:', error);
          // Try to initialize anyway
          setTimeout(initWebPush, 2000);
        });
    } else {
      // If service worker not supported, still try to initialize
      console.warn('⚠️ Service Worker not supported in this browser');
      setTimeout(initWebPush, 1000);
    }
  </script>
