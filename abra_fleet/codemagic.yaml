workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.example.abraFleet
    working_directory: abra_fleet
    scripts:
      - name: Flutter packages get
        script: |
          flutter packages pub get

      - name: Generate app icons
        script: |
          dart run flutter_launcher_icons

      - name: Pod install
        script: |
          cd ios && pod install --repo-update

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
